name: stale-branches.yml – Delete Stale Branches

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  schedule:
    - cron: '0 6 * * 0'

permissions: 
  contents: read

jobs:
  stale_branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Stale Branches
        uses: crs-k/stale-branches@e876b957ab08f0bad43c8cc271a22cdd7604bd09 # v9.0.1
        with:
            # days-before-delete: 180
            # comment-updates: false
            # max-issues: 20
            tag-committer: true
            stale-branch-label: 'stale branch 🗑️'
            # compare-branches: 'info'
            # branches-filter-regex: '^((?!dependabot))'
            # rate-limit: false
            # pr-check: false
            # dry-run: false
            # ignore-issue-interaction: false
            # include-protected-branches: false
            # include-ruleset-branches: false
            # ignore-commit-messages: ''
            # ignore-committers: ''
